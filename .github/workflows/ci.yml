name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend (needed by lorica-api dependency)
        run: |
          cd lorica-dashboard/frontend
          npm ci
          npm run build

      - name: Clippy (product crates)
        run: cargo clippy -p lorica-config -p lorica-waf -p lorica-api -p lorica-notify -p lorica-bench -- -D warnings

      - name: Cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit 2>&1

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd lorica-dashboard/frontend
          npm ci
          npm run build

      - name: Run Rust unit tests (product crates)
        run: cargo test -p lorica-config -p lorica-waf -p lorica-api -p lorica-notify -p lorica-bench
        env:
          SKIP_FRONTEND_BUILD: ""

      - name: Run Rust unit tests (forked crates)
        run: cargo test -p lorica-core -p lorica-proxy -p lorica-http -p lorica-error -p lorica-tls -p lorica-command -p lorica-worker -p lorica-lb || true
        env:
          SKIP_FRONTEND_BUILD: "1"

      - name: Run frontend tests
        run: |
          cd lorica-dashboard/frontend
          npx vitest run

  build-and-package:
    name: Build & Package
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd lorica-dashboard/frontend
          npm ci
          npm run build

      - name: Build release binary
        run: cargo build --release -p lorica

      - name: Verify binary
        run: |
          file target/release/lorica
          target/release/lorica --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: lorica-linux-x86_64
          path: target/release/lorica
          retention-days: 30

      # Package .deb (same job, no artifact download needed)
      - name: Build .deb package
        run: |
          chmod +x target/release/lorica
          bash dist/build-deb.sh ./target/release/lorica

      - name: Verify .deb package
        run: |
          for deb in dist/*.deb; do
            echo "--- $deb ---"
            dpkg-deb --info "$deb"
            dpkg-deb --contents "$deb"
          done

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: lorica-deb
          path: dist/*.deb
          retention-days: 30

      # Package .rpm (using alien to convert deb -> rpm on Ubuntu)
      - name: Install rpm tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build .rpm package
        run: |
          chmod +x target/release/lorica
          bash dist/build-rpm.sh ./target/release/lorica

      - name: Verify .rpm package
        run: |
          for rpm in dist/*.rpm; do
            echo "--- $rpm ---"
            rpm -qpi "$rpm"
            rpm -qpl "$rpm"
          done

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Sign .deb package
        run: |
          for deb in dist/*.deb; do
            gpg --batch --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --detach-sign --armor "$deb"
            echo "Signed: ${deb}.asc"
          done

      - name: Sign .rpm package
        run: |
          echo "%_gpg_name Rwx-G (Lorica Project on Github : github.com/rwx-g/Lorica) <romain@rwx-g.fr>" > ~/.rpmmacros
          for rpm_file in dist/*.rpm; do
            rpm --addsign "$rpm_file" <<< "${{ secrets.GPG_PASSPHRASE }}" || echo "RPM signing skipped (may need rpm-sign package)"
          done

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: lorica-rpm
          path: dist/*.rpm
          retention-days: 30

  test-deb-install:
    name: Test .deb install
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lorica-deb
          path: dist/
      - name: Install and verify
        run: |
          sudo apt-get update
          sudo dpkg -i dist/*.deb || sudo apt-get install -f -y
          test -x /usr/bin/lorica
          test -f /lib/systemd/system/lorica.service
          lorica --version
          echo ".deb installation verified OK"

  test-rpm-install:
    name: Test .rpm install
    needs: build-and-package
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lorica-rpm
          path: dist/
      - name: Install and verify
        run: |
          rpm -ivh dist/*.rpm
          test -x /usr/bin/lorica
          test -f /usr/lib/systemd/system/lorica.service
          lorica --version
          echo ".rpm installation verified OK"

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-deb-install, test-rpm-install]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: lorica-linux-x86_64
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: lorica-deb
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: lorica-rpm
          path: dist/

      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --output-file dist/lorica-sbom.cdx.json || true

      - name: Create GitHub Release
        run: |
          # Collect only files (not directories) from dist/
          ASSETS=$(find dist/ -maxdepth 1 -type f)
          # Create release (or update if it already exists from a previous failed run)
          gh release create "${{ github.ref_name }}" $ASSETS \
            --title "Lorica ${{ github.ref_name }}" \
            --generate-notes 2>/dev/null \
          || gh release upload "${{ github.ref_name }}" $ASSETS --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
