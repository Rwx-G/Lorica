<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>App 2</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #0a3d62; color: #e0e0e0; }
    .card { background: #1e5f74; border: 2px solid #ffc048; border-radius: 12px; padding: 3rem 4rem; text-align: center; }

    p { font-size: 1.2rem; color: #c0d0e0; }

<body>
  <div class="card">
    <h1>App 2</h1>
    <p>Backend server running on <strong>app2:80</strong></p>

</html>
