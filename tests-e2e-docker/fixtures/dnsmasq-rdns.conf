# dnsmasq config for the Lorica rDNS E2E smoke profile.
#
# Contract: Lorica's bot-protection bypass matrix includes an
# `rdns` category that trusts only forward-confirmed PTR matches
# (see docs/architecture/bot-protection.md section 10.3). The
# smoke test binds two IPs to fixtures here:
#
# - 203.0.113.42 -> PTR crawler.bot-e2e.local, forward A back to
#   203.0.113.42. This confirms, so a bypass rule on suffix
#   "bot-e2e.local" matches.
# - 203.0.113.77 -> PTR spoofed.bot-e2e.local, but NO forward A
#   record; forward confirm fails, so the bypass MUST NOT fire
#   (the test asserts the challenge still renders for this IP).
#
# Using `--host-record` installs both forward A and PTR in one
# go. We add `--address` for the spoofed hostname so it resolves
# to a DIFFERENT IP and forward-confirm rejects it (not missing;
# actively mismatched — stronger threat model coverage).

# --- Trusted crawler: PTR + forward match ------------------------------------
host-record=crawler.bot-e2e.local,203.0.113.42

# --- Spoofed crawler: PTR says `spoofed.bot-e2e.local`, but the
# forward A for that name points somewhere else, so Lorica's
# forward-confirm step rejects the bypass. Two directives:
#   1. PTR 203.0.113.77 -> spoofed.bot-e2e.local
#   2. A    spoofed.bot-e2e.local -> 198.51.100.99 (NOT 203.0.113.77)
ptr-record=77.113.0.203.in-addr.arpa,spoofed.bot-e2e.local
address=/spoofed.bot-e2e.local/198.51.100.99

# No external recursion: this dnsmasq only answers the test zone.
# Everything else NXDOMAIN so a misconfigured test fails loud.
no-resolv
no-hosts

# Verbose logging into container stdout so a regression triage
# has the full query log without needing to attach a debugger.
log-queries
log-facility=-
