services:
  lorica:
    build:
      context: ..
      dockerfile: tests-e2e-docker/Dockerfile
    ports:
      - "9443:9443"   # Management dashboard
      - "80:8080"     # HTTP proxy (host port 80 -> container 8080)
      - "8080:8080"   # HTTP proxy (alternative)
      - "8443:8443"   # HTTPS proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - lorica-data:/var/lib/lorica
      - shared:/shared
    depends_on:
      - backend1
      - backend2
      - backend-tls
    networks:
      - e2e

  lorica-workers:
    build:
      context: ..
      dockerfile: tests-e2e-docker/Dockerfile
    entrypoint: ["/entrypoint-workers.sh"]
    volumes:
      - lorica-workers-data:/var/lib/lorica
      - shared-workers:/shared
    depends_on:
      - backend1
      - backend2
    networks:
      - e2e

  backend1:
    build:
      context: ./backend
    environment:
      - BACKEND_ID=backend1
      - LISTEN_PORT=80
    networks:
      - e2e

  backend2:
    build:
      context: ./backend
    environment:
      - BACKEND_ID=backend2
      - LISTEN_PORT=80
    networks:
      - e2e

  backend-tls:
    build:
      context: ./backend
    environment:
      - BACKEND_ID=backend-tls
      - LISTEN_PORT=443
      - TLS_ENABLED=1
    networks:
      - e2e

  backend-h2:
    build:
      context: ./backend-h2
    environment:
      - BACKEND_ID=backend-h2
      - LISTEN_PORT=80
    networks:
      - e2e

  test-runner:
    build:
      context: ./test-runner
    depends_on:
      - lorica
    volumes:
      - shared:/shared:ro
    environment:
      - LORICA_API=http://lorica:9443
      - LORICA_PROXY=http://lorica:8080
      - LORICA_PROXY_HTTPS=https://lorica:8443
      - BACKEND1_ADDR=backend1:80
      - BACKEND2_ADDR=backend2:80
      - BACKEND_TLS_ADDR=backend-tls:443
      - BACKEND_H2_ADDR=backend-h2:80
    networks:
      - e2e

  test-runner-workers:
    build:
      context: ./test-runner
    entrypoint: ["bash", "run-tests-workers.sh"]
    depends_on:
      - lorica-workers
    volumes:
      - shared-workers:/shared:ro
    environment:
      - LORICA_API=http://lorica-workers:9443
      - LORICA_PROXY=http://lorica-workers:8080
      - BACKEND1_ADDR=backend1:80
      - BACKEND2_ADDR=backend2:80
    networks:
      - e2e

  # ---- OpenTelemetry E2E (v1.4.0 Epic 1, story 1.8) --------------------
  # Optional profile that wires Lorica built with `--features otel`
  # against a Jaeger all-in-one collector so the `otel-smoke` test can
  # drive a request through the proxy and assert the resulting span
  # tree is visible via Jaeger's HTTP query API.
  #
  # Run with: docker compose --profile otel up --build
  #   docker compose --profile otel run --rm otel-smoke
  #
  # Jaeger exposes:
  #   4317 (OTLP/gRPC)    - not used by Lorica in the default config
  #   4318 (OTLP/HTTP)    - used when protocol=http-proto or http-json
  #   16686 (Query UI)    - http://localhost:16686 after `up`
  jaeger:
    image: jaegertracing/all-in-one:1.60
    profiles: ["otel"]
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    networks:
      - e2e

  lorica-otel:
    build:
      context: ..
      dockerfile: tests-e2e-docker/Dockerfile
      args:
        LORICA_FEATURES: "otel"
    entrypoint: ["/entrypoint-otel.sh"]
    profiles: ["otel"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - lorica-otel-data:/var/lib/lorica
      - shared-otel:/shared
    depends_on:
      - backend1
      - jaeger
    networks:
      - e2e

  otel-smoke:
    build:
      context: ./test-runner
    profiles: ["otel"]
    entrypoint: ["bash", "run-otel-smoke.sh"]
    depends_on:
      - lorica-otel
      - jaeger
    volumes:
      - shared-otel:/shared:ro
    environment:
      - LORICA_API=http://lorica-otel:9443
      - LORICA_PROXY=http://lorica-otel:8080
      - JAEGER_QUERY=http://jaeger:16686
      - BACKEND1_ADDR=backend1:80
    networks:
      - e2e

  # ---- OTel E2E in WORKER MODE (v1.4.0 story 1.6) ---------------------
  # Variant of the OTel profile that runs Lorica with `--workers 2` so
  # the same smoke assertions exercise the forked-worker OTel init
  # path. The separate `shared-otel-workers` volume keeps the
  # admin_password + log.sock isolated from the single-process OTel
  # container (they cannot share SQLite on the same data volume
  # without cross-boot mutation; a second named volume is the
  # cheapest safe split).
  #
  # Run with:
  #   docker compose --profile otel-workers up --build
  #   docker compose --profile otel-workers run --rm otel-smoke-workers
  lorica-otel-workers:
    build:
      context: ..
      dockerfile: tests-e2e-docker/Dockerfile
      args:
        LORICA_FEATURES: "otel"
    entrypoint: ["/entrypoint-otel-workers.sh"]
    profiles: ["otel-workers"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - lorica-otel-workers-data:/var/lib/lorica
      - shared-otel-workers:/shared
    depends_on:
      - backend1
      - jaeger-workers
    networks:
      - e2e

  # A second Jaeger is required because the single-process `jaeger`
  # service lives under the `otel` profile and Compose V2 does not
  # cross-activate profiles. Sharing a Jaeger is possible with
  # `profiles: ["otel", "otel-workers"]` but duplicating for clarity.
  jaeger-workers:
    image: jaegertracing/all-in-one:1.60
    profiles: ["otel-workers"]
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - e2e

  otel-smoke-workers:
    build:
      context: ./test-runner
    profiles: ["otel-workers"]
    entrypoint: ["bash", "run-otel-smoke.sh"]
    depends_on:
      - lorica-otel-workers
      - jaeger-workers
    volumes:
      - shared-otel-workers:/shared:ro
    environment:
      - LORICA_API=http://lorica-otel-workers:9443
      - LORICA_PROXY=http://lorica-otel-workers:8080
      - JAEGER_QUERY=http://jaeger-workers:16686
      - BACKEND1_ADDR=backend1:80
    networks:
      - e2e

  # ---- GeoIP E2E (v1.4.0 Epic 2, story 2.7) ---------------------------
  # Optional profile that boots Lorica with a test `.mmdb` fixture
  # mounted from the host (MaxMind's open `GeoIP2-Country-Test.mmdb`,
  # Apache-2.0). The `geoip-smoke` runner drives requests with
  # X-Forwarded-For headers pointing at known test IPs and asserts
  # allowlist / denylist / fallthrough behavior plus the
  # `lorica_geoip_block_total` Prometheus counter.
  #
  # Run with: docker compose --profile geoip up --build
  #   docker compose --profile geoip run --rm geoip-smoke
  lorica-geoip:
    build:
      context: ..
      dockerfile: tests-e2e-docker/Dockerfile
    entrypoint: ["/entrypoint-geoip.sh"]
    profiles: ["geoip"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - lorica-geoip-data:/var/lib/lorica
      - shared-geoip:/shared
      # Mount the test fixture read-only into the path the entrypoint
      # pre-seeds into `global_settings.geoip_db_path`.
      - ./fixtures/GeoIP2-Country-Test.mmdb:/var/lib/lorica/geoip-test.mmdb:ro
    depends_on:
      - backend1
    networks:
      - e2e

  geoip-smoke:
    build:
      context: ./test-runner
    profiles: ["geoip"]
    entrypoint: ["bash", "run-geoip-smoke.sh"]
    depends_on:
      - lorica-geoip
    volumes:
      - shared-geoip:/shared:ro
    environment:
      - LORICA_API=http://lorica-geoip:9443
      - LORICA_PROXY=http://lorica-geoip:8080
      - BACKEND1_ADDR=backend1:80
    networks:
      - e2e

  # ---- Bot-protection E2E (v1.4.0 Epic 3 story 3.9) -------------------
  # Runs the default Lorica image; the smoke drives everything over
  # the management API (trusted_proxies + geoip_db_path + route
  # creation). The geoip test fixture is mounted so the
  # country-based bypass match resolves for the known-US IP the
  # smoke uses.
  lorica-bot:
    build:
      context: ..
      dockerfile: tests-e2e-docker/Dockerfile
    profiles: ["bot"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - lorica-bot-data:/var/lib/lorica
      - shared-bot:/shared
      - ./fixtures/GeoIP2-Country-Test.mmdb:/var/lib/lorica/geoip-test.mmdb:ro
      - ./fixtures/GeoLite2-ASN-Test.mmdb:/var/lib/lorica/asn-test.mmdb:ro
    depends_on:
      - backend1
    networks:
      - e2e

  bot-smoke:
    build:
      context: ./test-runner
    profiles: ["bot"]
    entrypoint: ["bash", "run-bot-smoke.sh"]
    depends_on:
      - lorica-bot
    volumes:
      - shared-bot:/shared:ro
    environment:
      - LORICA_API=http://lorica-bot:9443
      - LORICA_PROXY=http://lorica-bot:8080
      - BACKEND1_ADDR=backend1:80
    networks:
      - e2e

  # Bot-protection E2E in WORKER MODE. Same smoke as above, but
  # Lorica runs with `--workers 2` so the SQLite-backed pending
  # stash is exercised across workers. A challenge stashed on one
  # worker must be consumable on the other — the smoke PoW-solves
  # after re-configuring the route, which inherently alternates
  # which worker handles each call via the default round-robin
  # connection distribution.
  lorica-bot-workers:
    build:
      context: ..
      dockerfile: tests-e2e-docker/Dockerfile
    profiles: ["bot-workers"]
    entrypoint: ["/entrypoint-workers.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - lorica-bot-workers-data:/var/lib/lorica
      - shared-bot-workers:/shared
      - ./fixtures/GeoIP2-Country-Test.mmdb:/var/lib/lorica/geoip-test.mmdb:ro
      - ./fixtures/GeoLite2-ASN-Test.mmdb:/var/lib/lorica/asn-test.mmdb:ro
    depends_on:
      - backend1
    networks:
      - e2e

  bot-smoke-workers:
    build:
      context: ./test-runner
    profiles: ["bot-workers"]
    entrypoint: ["bash", "run-bot-smoke.sh"]
    depends_on:
      - lorica-bot-workers
    volumes:
      - shared-bot-workers:/shared:ro
    environment:
      - LORICA_API=http://lorica-bot-workers:9443
      - LORICA_PROXY=http://lorica-bot-workers:8080
      - BACKEND1_ADDR=backend1:80
      # The bot-protection Prometheus counter is currently per-
      # worker (same behaviour as `lorica_geoip_block_total`). The
      # supervisor's `/metrics` does not aggregate it. The smoke's
      # counter-delta check would always fail in worker mode even
      # though the functional flow works; set this to skip it.
      - BOT_SMOKE_SKIP_METRICS=1
    networks:
      - e2e

volumes:
  lorica-data:
  lorica-workers-data:
  lorica-otel-data:
  lorica-otel-workers-data:
  lorica-geoip-data:
  lorica-bot-data:
  lorica-bot-workers-data:
  shared:
  shared-workers:
  shared-bot-workers:
  shared-otel:
  shared-otel-workers:
  shared-geoip:
  shared-bot:

networks:
  e2e:
