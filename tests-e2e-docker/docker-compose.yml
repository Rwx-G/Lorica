services:
  lorica:
    build:
      context: ..
      dockerfile: tests-e2e-docker/Dockerfile
    ports:
      - "9443:9443"   # Management dashboard
      - "8080:8080"   # HTTP proxy
      - "8443:8443"   # HTTPS proxy
    volumes:
      - lorica-data:/var/lib/lorica
      - shared:/shared
    depends_on:
      - backend1
      - backend2
    networks:
      - e2e

  lorica-workers:
    build:
      context: ..
      dockerfile: tests-e2e-docker/Dockerfile
    entrypoint: ["/entrypoint-workers.sh"]
    volumes:
      - lorica-workers-data:/var/lib/lorica
      - shared-workers:/shared
    depends_on:
      - backend1
      - backend2
    networks:
      - e2e

  backend1:
    build:
      context: ./backend
    environment:
      - BACKEND_ID=backend1
      - LISTEN_PORT=80
    networks:
      - e2e

  backend2:
    build:
      context: ./backend
    environment:
      - BACKEND_ID=backend2
      - LISTEN_PORT=80
    networks:
      - e2e

  test-runner:
    build:
      context: ./test-runner
    depends_on:
      - lorica
    volumes:
      - shared:/shared:ro
    environment:
      - LORICA_API=http://lorica:9443
      - LORICA_PROXY=http://lorica:8080
      - LORICA_PROXY_HTTPS=https://lorica:8443
      - BACKEND1_ADDR=backend1:80
      - BACKEND2_ADDR=backend2:80
    networks:
      - e2e

  test-runner-workers:
    build:
      context: ./test-runner
    entrypoint: ["bash", "run-tests-workers.sh"]
    depends_on:
      - lorica-workers
    volumes:
      - shared-workers:/shared:ro
    environment:
      - LORICA_API=http://lorica-workers:9443
      - LORICA_PROXY=http://lorica-workers:8080
      - BACKEND1_ADDR=backend1:80
      - BACKEND2_ADDR=backend2:80
    networks:
      - e2e

volumes:
  lorica-data:
  lorica-workers-data:
  shared:
  shared-workers:

networks:
  e2e:
