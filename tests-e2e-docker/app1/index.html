<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>App 1</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1a1a2e; color: #e0e0e0; }
    .card { background: #16213e; border: 2px solid #0f3460; border-radius: 12px; padding: 3rem 4rem; text-align: center; }
    h1 { color: #e94560; font-size: 2.5rem; margin: 0 0 1rem; }
    p { font-size: 1.2rem; color: #a0a0b0; }
    .badge { display: inline-block; background: #e94560; color: white; padding: 0.3rem 1rem; border-radius: 20px; font-weight: bold; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>App 1</h1>
    <p>Backend server running on <strong>app1:80</strong></p>
    <div class="badge">Served by nginx - container app1</div>
  </div>
</body>
</html>
