    notes: "Ban list checked early in request_filter - banned IPs get 403 immediately. Auto-ban escalation prevents sustained abuse. AlertType::IpBanned notifies administrators."
  performance:
    status: PASS
    notes: "Ban list uses RwLock<HashMap> - read-heavy workload is efficient. Lazy expiry avoids background thread overhead. Violation tracking reuses lorica-limits Rate estimator."
  reliability:
    status: PASS
    notes: "Ban list is in-memory only (intentional - bans are temporary). Lazy cleanup removes expired entries during request processing. Default ban duration is 3600s."
