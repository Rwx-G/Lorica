[package]
name = "lorica-api"
version = "0.3.0"
authors = ["Rwx-G"]
license = "Apache-2.0"
edition = "2021"
repository = "https://github.com/Rwx-G/Lorica"
description = "REST API for Lorica reverse proxy management"

[dependencies]
lorica-config = { version = "0.3.0", path = "../lorica-config" }
lorica-dashboard = { version = "0.3.0", path = "../lorica-dashboard" }
lorica-waf = { version = "0.1.0", path = "../lorica-waf" }
axum = { version = "0.7", features = ["multipart", "ws"] }
futures-util = "0.3"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors"] }
tokio = { workspace = true, features = ["rt-multi-thread", "signal", "macros", "sync", "time"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
argon2 = "0.5"
rand = "0.8"
rcgen = "0.13"
ring = "0.17"
sysinfo = "0.33"
thiserror = "2"
tracing = "0.1"
prometheus = "0.14"
once_cell = { workspace = true }
http = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "test-util"] }
hyper = { version = "1", features = ["full"] }
tower = { version = "0.4", features = ["util"] }
tempfile = "3"
