openapi: 3.0.3
info:
  title: Lorica API
  description: REST API for Lorica reverse proxy management
  version: "1.5.1"
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:9443
    description: Management port (localhost only)

tags:
  - name: Auth
    description: Authentication and session management
  - name: Settings
    description: Global settings
  - name: Routes
    description: Proxy route management
  - name: Backends
    description: Backend server management
  - name: Certificates
    description: TLS certificate management
  - name: ACME
    description: ACME certificate provisioning
  - name: Cache
    description: Cache management and statistics
  - name: Bans
    description: IP ban management
  - name: WAF
    description: Web Application Firewall
  - name: SLA
    description: SLA monitoring and reporting
  - name: Probes
    description: Health probe management
  - name: LoadTest
    description: Load testing
  - name: Logs
    description: Log access and streaming
  - name: System
    description: System status and metrics
  - name: Config
    description: Configuration import/export
  - name: Notifications
    description: Notification channel management
  - name: Preferences
    description: User preferences

paths:
  # ---------------------------------------------------------------------------
  # Auth (public)
  # ---------------------------------------------------------------------------
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Session cookie (HttpOnly, SameSite=Strict)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      must_change_password:
                        type: boolean
                      session_expires_at:
                        type: string
                        format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate session and logout
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ---------------------------------------------------------------------------
  # Metrics (public)
  # ---------------------------------------------------------------------------
  /metrics:
    get:
      tags: [System]
      summary: Prometheus-compatible metrics endpoint
      responses:
        "200":
          description: Metrics in Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string

  # ---------------------------------------------------------------------------
  # ACME challenge (public)
  # ---------------------------------------------------------------------------
  /.well-known/acme-challenge/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [ACME]
      summary: Serve ACME HTTP-01 challenge response
      responses:
        "200":
          description: Challenge token value
          content:
            text/plain:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Auth - password change (protected)
  # ---------------------------------------------------------------------------
  /api/v1/auth/password:
    put:
      tags: [Auth]
      summary: Change admin password
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Settings
  # ---------------------------------------------------------------------------
  /api/v1/settings:
    get:
      tags: [Settings]
      summary: Get global settings
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Settings]
      summary: Update global settings
      description: |
        Updates global settings. All fields are optional - only provided fields
        are changed. The `trusted_proxies` field accepts an array of CIDR ranges
        or IP addresses. X-Forwarded-For is only trusted when the direct TCP
        client IP matches a trusted proxy entry. Empty array = trust no XFF.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trusted_proxies:
                  type: array
                  items:
                    type: string
                  description: CIDR ranges or IPs of trusted reverse proxies
                  example: ["192.168.0.0/16", "10.0.0.0/8"]
                waf_whitelist_ips:
                  type: array
                  items:
                    type: string
                  description: IPs or CIDRs that bypass WAF, rate limiting, IP blocklist, and auto-ban
                  example: ["203.0.113.50", "10.0.0.0/8"]
                connection_deny_cidrs:
                  type: array
                  items:
                    type: string
                  description: IPs or CIDRs dropped at TCP accept time, before TLS handshake. Evaluated after the allow list; deny always wins.
                  example: ["198.51.100.0/24"]
                connection_allow_cidrs:
                  type: array
                  items:
                    type: string
                  description: When non-empty, only listed IPs are accepted at TCP accept (default-deny mode). Leave empty for default-allow.
                  example: ["10.0.0.0/8", "192.168.0.0/16"]
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Routes
  # ---------------------------------------------------------------------------
  /api/v1/routes:
    get:
      tags: [Routes]
      summary: List all routes
      security:
        - sessionCookie: []
      responses:
        "200":
          description: List of routes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      routes:
                        type: array
                        items:
                          $ref: "#/components/schemas/Route"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Routes]
      summary: Create a new route
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRouteRequest"
      responses:
        "201":
          description: Route created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Route"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/routes/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Routes]
      summary: Get route by ID
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Route details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Route"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Routes]
      summary: Update route
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRouteRequest"
      responses:
        "200":
          description: Route updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Route"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Routes]
      summary: Delete route
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Route deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Backends
  # ---------------------------------------------------------------------------
  /api/v1/backends:
    get:
      tags: [Backends]
      summary: List all backends
      security:
        - sessionCookie: []
      responses:
        "200":
          description: List of backends
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      backends:
                        type: array
                        items:
                          $ref: "#/components/schemas/Backend"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Backends]
      summary: Add a new backend
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBackendRequest"
      responses:
        "201":
          description: Backend created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Backend"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/backends/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Backends]
      summary: Get backend by ID
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Backend details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Backend"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Backends]
      summary: Update backend
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBackendRequest"
      responses:
        "200":
          description: Backend updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Backend"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Backends]
      summary: Delete backend
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Backend deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Certificates
  # ---------------------------------------------------------------------------
  /api/v1/certificates:
    get:
      tags: [Certificates]
      summary: List all certificates
      security:
        - sessionCookie: []
      responses:
        "200":
          description: List of certificates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      certificates:
                        type: array
                        items:
                          $ref: "#/components/schemas/Certificate"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Certificates]
      summary: Upload a certificate
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCertificateRequest"
      responses:
        "201":
          description: Certificate created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Certificate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/certificates/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Certificates]
      summary: Get certificate details
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Certificate details with associated routes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CertificateDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Certificates]
      summary: Update certificate
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cert_pem:
                  type: string
                key_pem:
                  type: string
      responses:
        "200":
          description: Certificate updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Certificate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Certificates]
      summary: Delete certificate
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Certificate deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Certificate is referenced by routes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/certificates/{id}/download:
    get:
      tags: [Certificates]
      summary: Download one certificate's PEM material
      description: |
        Returns a PEM file with the requested part(s) of a stored
        certificate. Audit-logged (tracing::warn with client IP +
        cert id) and rate-limited at 5 downloads per 60s per IP.
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: part
          required: false
          schema:
            type: string
            enum: [cert, key, chain, bundle]
            default: bundle
          description: |
            Which material to return. `cert` = leaf only,
            `chain` = leaf + intermediates,
            `key` = private key only,
            `bundle` (default) = leaf + chain + key in a single PEM.
      responses:
        "200":
          description: PEM file stream
          content:
            application/x-pem-file:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          description: Rate limit exceeded (5 downloads per 60s per IP)

  /api/v1/certificates/self-signed:
    post:
      tags: [Certificates]
      summary: Generate a self-signed certificate
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain]
              properties:
                domain:
                  type: string
      responses:
        "201":
          description: Self-signed certificate generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Certificate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # ACME
  # ---------------------------------------------------------------------------
  /api/v1/acme/provision:
    post:
      tags: [ACME]
      summary: Provision certificate via ACME HTTP-01 challenge
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain]
              properties:
                domain:
                  type: string
      responses:
        "200":
          description: Certificate provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/acme/provision-dns:
    post:
      tags: [ACME]
      summary: Provision certificate via ACME DNS-01 challenge (automatic)
      description: >
        Supports multi-domain and wildcard certificates via comma-separated
        domains (e.g. "example.com, *.example.com").
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain]
              properties:
                domain:
                  type: string
                  description: >
                    One or more domains (comma-separated). Wildcards supported
                    (e.g. "example.com, *.example.com").
      responses:
        "200":
          description: Certificate provisioned via DNS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/acme/provision-dns-manual:
    post:
      tags: [ACME]
      summary: Start manual DNS-01 challenge (returns TXT record(s) to create)
      description: >
        Supports multi-domain and wildcard certificates via comma-separated
        domains (e.g. "example.com, *.example.com"). Returns all TXT records
        that must be created before calling the confirm endpoint.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain]
              properties:
                domain:
                  type: string
                  description: >
                    One or more domains (comma-separated). Wildcards supported
                    (e.g. "example.com, *.example.com").
                staging:
                  type: boolean
                  default: true
                contact_email:
                  type: string
      responses:
        "200":
          description: DNS TXT record details to create
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                      domain:
                        type: string
                        description: Primary domain (first in comma-separated list).
                      txt_record_name:
                        type: string
                        description: First TXT record name (backwards-compatible).
                      txt_record_value:
                        type: string
                        description: First TXT record value (backwards-compatible).
                      txt_records:
                        type: array
                        description: All TXT records to create.
                        items:
                          type: object
                          properties:
                            domain:
                              type: string
                            name:
                              type: string
                            value:
                              type: string
                      message:
                        type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/acme/provision-dns-manual/confirm:
    post:
      tags: [ACME]
      summary: Confirm manual DNS-01 challenge after TXT record(s) are set
      description: >
        Call after creating all TXT records returned by step 1. The domain
        must match the primary domain used in the initial request.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain]
              properties:
                domain:
                  type: string
                  description: Primary domain (same as returned in step 1).
      responses:
        "200":
          description: Certificate provisioned after DNS verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Cache
  # ---------------------------------------------------------------------------
  /api/v1/cache/routes/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    delete:
      tags: [Cache]
      summary: Purge cached entries for a route
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Cache purged for route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/cache/stats:
    get:
      tags: [Cache]
      summary: Get cache hit/miss statistics
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Cache statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      hits:
                        type: integer
                      misses:
                        type: integer
                      hit_rate:
                        type: number
                        format: double
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Bans
  # ---------------------------------------------------------------------------
  /api/v1/bans:
    get:
      tags: [Bans]
      summary: List all banned IPs
      security:
        - sessionCookie: []
      responses:
        "200":
          description: List of banned IPs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      bans:
                        type: array
                        items:
                          type: object
                          properties:
                            ip:
                              type: string
                            banned_at:
                              type: string
                              format: date-time
                            duration_s:
                              type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/bans/{ip}:
    parameters:
      - name: ip
        in: path
        required: true
        description: IP address to unban
        schema:
          type: string
    delete:
      tags: [Bans]
      summary: Remove an IP ban
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Ban removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Logs
  # ---------------------------------------------------------------------------
  /api/v1/logs:
    get:
      tags: [Logs]
      summary: Get recent log entries
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      logs:
                        type: array
                        items:
                          type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Logs]
      summary: Clear log buffer
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Logs cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/logs/ws:
    get:
      tags: [Logs]
      summary: Stream logs via WebSocket
      security:
        - sessionCookie: []
      responses:
        "101":
          description: WebSocket upgrade for real-time log streaming
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # System / Status / Workers
  # ---------------------------------------------------------------------------
  /api/v1/status:
    get:
      tags: [System]
      summary: Proxy status overview
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Status overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Status"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/system:
    get:
      tags: [System]
      summary: System information (CPU, memory, uptime)
      security:
        - sessionCookie: []
      responses:
        "200":
          description: System metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/workers:
    get:
      tags: [System]
      summary: List worker processes and their health
      security:
