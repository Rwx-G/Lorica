  # ---------------------------------------------------------------------------
  # Certificate filesystem export (v1.4.1)
  # ---------------------------------------------------------------------------
  /api/v1/cert-export/acls:
    get:
      tags: [Certificates]
      summary: List per-pattern cert-export ACLs
      security:
        - sessionCookie: []
      responses:
        "200":
          description: ACL list
          content:
            application/json:
              schema:
                type: object
                properties:
                  acls:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        hostname_pattern: { type: string }
                        allowed_uid: { type: integer, nullable: true }
                        allowed_gid: { type: integer, nullable: true }
                        created_at: { type: string, format: date-time }
    post:
      tags: [Certificates]
      summary: Create a cert-export ACL rule
      description: |
        Adds a hostname pattern (`*`, `*.suffix`, or exact hostname)
        and optional UID / GID override. On export, Lorica picks
        the most-specific matching pattern and applies its UID /
        GID. If no pattern matches, the cert is not exported.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname_pattern]
              properties:
                hostname_pattern:
                  type: string
                  example: "*.prod.mibu.fr"
                allowed_uid:
                  type: integer
                  nullable: true
                allowed_gid:
                  type: integer
                  nullable: true
      responses:
        "201":
          description: ACL created
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/cert-export/acls/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    delete:
      tags: [Certificates]
      summary: Delete a cert-export ACL rule (idempotent)
      security:
        - sessionCookie: []
      responses:
        "200":
          description: ACL deleted

  /api/v1/cert-export/reapply:
    post:
      tags: [Certificates]
      summary: Re-export every certificate to the configured directory
      description: |
        Forces a full re-export of every cert on disk. Honours the
        currently-persisted settings + ACL rules. Useful after
        changing ACLs or modes without waiting for the next ACME
        renewal.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Re-export summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  exported:
                    type: integer
                  failed:
                    type: integer

  /api/v1/cert-export/orphans:
    get:
      tags: [Certificates]
      summary: List per-hostname subdirectories left behind by deleted certs
      description: |
        Scans `cert_export_dir` and returns every subdirectory whose
        name does not correspond to a live certificate (either by
        sanitised hostname or the `cert-{id}` fallback). Each entry
        carries its modification timestamp and the summed size of
        the four expected PEM files so the dashboard can surface
        the stale bytes before offering deletion.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Orphan list
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  orphans:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        modified_at:
                          type: string
                          format: date-time
                        size_bytes:
                          type: integer

  /api/v1/cert-export/orphans/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Subdirectory name (sanitised hostname).
    delete:
      tags: [Certificates]
      summary: Delete one orphan cert-export subdirectory
      description: |
        Removes a per-hostname subdirectory that has no corresponding
        live certificate. The server re-runs the hostname sanitiser
        and re-checks the live-cert set before touching the disk, so
        a stale dashboard click or a racy delete cannot blow away a
        legitimate directory.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Deletion outcome
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  removed:
                    type: boolean
        "400":
          description: Invalid name or live cert still maps to the directory

  # ---------------------------------------------------------------------------
  # Preferences
  # ---------------------------------------------------------------------------
  /api/v1/preferences:
    get:
      tags: [Preferences]
      summary: List user preferences
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Preferences list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      preferences:
                        type: array
                        items:
                          type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/preferences/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    put:
      tags: [Preferences]
      summary: Update a preference
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Preference updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Preferences]
      summary: Delete a preference
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Preference deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: lorica_session

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Route:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hostname:
          type: string
        path_prefix:
          type: string
        backends:
          type: array
          items:
            type: string
            format: uuid
        certificate_id:
          type: string
          format: uuid
          nullable: true
        load_balancing:
          type: string
          enum: [round_robin, consistent_hash, random, peak_ewma]
        waf_enabled:
          type: boolean
        enabled:
          type: boolean
        redirect_to:
          type: string
          nullable: true
          description: If set, respond with 301 redirect to this URL instead of proxying. Original path is appended.
        return_status:
          type: integer
          nullable: true
          description: If set, respond with this HTTP status code directly without proxying.
        path_rules:
          type: array
          items:
            $ref: '#/components/schemas/PathRule'
          description: Ordered list of sub-path overrides. First matching rule wins.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateRouteRequest:
      type: object
      required: [hostname]
      properties:
        hostname:
          type: string
        path_prefix:
          type: string
          default: "/"
        backend_ids:
          type: array
          items:
            type: string
            format: uuid
        certificate_id:
          type: string
          format: uuid
        load_balancing:
          type: string
          enum: [round_robin, consistent_hash, random, peak_ewma]
          default: round_robin
        redirect_to:
          type: string
          description: If set, respond with 301 redirect to this URL instead of proxying.
        return_status:
          type: integer
          description: If set, respond with this HTTP status code directly.
        path_rules:
          type: array
          items:
            $ref: '#/components/schemas/PathRule'

    UpdateRouteRequest:
      type: object
      properties:
        hostname:
          type: string
        path_prefix:
          type: string
        backend_ids:
          type: array
          items:
            type: string
            format: uuid
        certificate_id:
          type: string
          format: uuid
        load_balancing:
          type: string
          enum: [round_robin, consistent_hash, random, peak_ewma]
        enabled:
          type: boolean
        redirect_to:
          type: string
          description: If set, respond with 301 redirect to this URL instead of proxying.
        return_status:
          type: integer
          description: If set, respond with this HTTP status code directly.
        path_rules:
          type: array
          items:
            $ref: '#/components/schemas/PathRule'

    PathRule:
      type: object
      required: [path]
      properties:
        path:
          type: string
          description: Path to match (e.g. /admin, /api/v1/)
        match_type:
          type: string
          enum: [prefix, exact]
          default: prefix
        backend_ids:
          type: array
          items:
            type: string
            format: uuid
        cache_enabled:
          type: boolean
        cache_ttl_s:
          type: integer
        response_headers:
          type: object
          additionalProperties:
            type: string
        response_headers_remove:
          type: array
          items:
            type: string
        rate_limit_rps:
          type: integer
        rate_limit_burst:
          type: integer
        redirect_to:
          type: string
        return_status:
          type: integer

    Backend:
      type: object
      properties:
        id:
          type: string
          format: uuid
        address:
          type: string
        weight:
          type: integer
        health_status:
          type: string
          enum: [healthy, degraded, down]
        health_check_enabled:
          type: boolean
        health_check_interval_s:
          type: integer
        tls_upstream:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateBackendRequest:
      type: object
      required: [address]
      properties:
        address:
          type: string
        weight:
          type: integer
          default: 100
        health_check_enabled:
          type: boolean
          default: true
        health_check_interval_s:
          type: integer
          default: 10
        tls_upstream:
          type: boolean
          default: false

    UpdateBackendRequest:
      type: object
      properties:
        address:
          type: string
        weight:
          type: integer
        health_check_enabled:
          type: boolean
        health_check_interval_s:
          type: integer
        tls_upstream:
          type: boolean

    Certificate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        domain:
          type: string
        san_domains:
          type: array
          items:
            type: string
        fingerprint:
          type: string
        issuer:
          type: string
        not_before:
          type: string
          format: date-time
        not_after:
          type: string
          format: date-time
        is_acme:
          type: boolean
        acme_auto_renew:
          type: boolean
        acme_method:
          type: string
          description: "ACME provisioning method: http01, dns01-cloudflare, dns01-route53, dns01-ovh, dns01-manual"
          nullable: true
        created_at:
          type: string
          format: date-time

    CertificateDetail:
      allOf:
        - $ref: "#/components/schemas/Certificate"
        - type: object
          properties:
            cert_pem:
              type: string
            associated_routes:
              type: array
              items:
                type: string
                format: uuid

    CreateCertificateRequest:
      type: object
      required: [domain, cert_pem, key_pem]
      properties:
        domain:
          type: string
        cert_pem:
          type: string
        key_pem:
          type: string

    Status:
      type: object
      properties:
        routes_count:
          type: integer
        backends_count:
          type: integer
        backends_healthy:
          type: integer
        backends_degraded:
          type: integer
        backends_down:
          type: integer
        certificates_count:
          type: integer
        certificates_expiring_soon:
          type: integer

    MessageResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            message:
              type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
